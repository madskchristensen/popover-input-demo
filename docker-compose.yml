version: '3.9'

services:
  nest:
    container_name: nest-dev
    build:
      context: ./nest
      dockerfile: Dockerfile
    command: npm run start:dev
    volumes:
      - ./nest:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development

  next:
    container_name: next-dev
    build:
      context: ./next
      dockerfile: Dockerfile
    command: npm run dev
    volumes:
      - ./next:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
