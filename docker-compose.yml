version: "3.9"
services:
  nest:
    container_name: nest-dev
    build:
      context: ./nest
      dockerfile: Dockerfile
    command: npm run start:dev
    volumes:
      - ./nest:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=job_applications
    depends_on:
      postgres:
        condition: service_healthy

  next:
    container_name: next-dev
    build:
      context: ./next
      dockerfile: Dockerfile
    command: npm run dev
    volumes:
      - ./next:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development

  postgres:
    container_name: postgres-dev
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_applications
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
